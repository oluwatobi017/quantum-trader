services:
  backend:
    build: ./server
    ports:
      - "8787:8787"
    env_file:
      - ./server/.env
    volumes:
      - qt-data:/app           # persist data.db
    restart: unless-stopped

  frontend:
    build: .
    ports:
      - "4173:4173"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  qt-data:
